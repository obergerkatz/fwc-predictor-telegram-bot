services:
  postgres:
    image: postgres:18-alpine
    container_name: football-predictor-db
    environment:
      POSTGRES_DB: ${DB_NAME:-football_predictor}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: football-predictor-bot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}

      # API-Football
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY}
      API_FOOTBALL_BASE_URL: ${API_FOOTBALL_BASE_URL}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # App
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Jobs
      FETCH_NEW_FIXTURES_CRON: ${FETCH_NEW_FIXTURES_CRON}
      REFRESH_MATCHES_STATUSES_CRON: ${REFRESH_MATCHES_STATUSES_CRON}
      CALCULATE_USER_POINTS_CRON: ${CALCULATE_USER_POINTS_CRON}
      PRE_MATCH_NOTIFICATION_CRON: ${PRE_MATCH_NOTIFICATION_CRON}
      POST_MATCH_NOTIFICATION_CRON: ${POST_MATCH_NOTIFICATION_CRON}

      # Leagues
      DEFAULT_LEAGUE_IDS: ${DEFAULT_LEAGUE_IDS}

      # Admin
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
